info:
  name: Suche nachname, email, ... vom Kundeen mit ID 20
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($kundeId: ID! = "20") {
        kunde(kundeId: $kundeId) {
          id
          version
          nachname
          email
          kategorie
          hasNewsletter
          geburtsdatum
          homepage
          geschlecht
          familienstand
          adresse {
            plz
            ort
          }
          fachaerzte
          username
        }
      }
    variables: |-
      {
        "kundeId": "20"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.kunde
      operator: isJson
    - expression: res.body.data.kunde.version
      operator: gte
      value: "0"
    - expression: res.body.data.kunde.nachname
      operator: isString
    - expression: res.body.data.kunde.nachname
      operator: isNotEmpty
    - expression: res.body.data.kunde.email
      operator: isString
    - expression: res.body.data.kunde.email
      operator: isNotEmpty
    - expression: res.body.data.kunde.kategorie
      operator: gt
      value: "0"
    - expression: res.body.data.kunde.hasNewsletter
      operator: isBoolean
    - expression: res.body.data.kunde.geburtsdatum
      operator: isString
    - expression: res.body.data.kunde.homepage
      operator: isString
    - expression: res.body.data.kunde.geschlecht
      operator: isString
    - expression: res.body.data.kunde.familienstand
      operator: isString
    - expression: res.body.data.kunde.adresse
      operator: isJson
    - expression: res.body.data.kunde.fachaerzte
      operator: isArray
    - expression: res.body.data.kunde.username
      operator: isString
    - expression: res.body.data.kunde.username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
